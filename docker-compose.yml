services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: petpal-backend
    expose:
      - "8000"
    env_file: .env
    environment:
      - PETPAL_DEV_MODE=0   # 生产关掉 dev trigger_now
    volumes:
      - ./data:/app/data  # 整个 data 目录持久化（含 vet_kb + uploads + petpal.db + chroma）
      - /root/.cache/huggingface:/root/.cache/huggingface  # RAG 模型（BGE embed/rerank）从宿主挂入，避免容器内重下
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: petpal-frontend
    ports:
      - "80:80"   # 备案前用 :80；备案后可改 nginx 加 :443 + SSL
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
