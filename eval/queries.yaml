# 30 条 query：10 条原 KB（01-11，防退化） + 20 条新 KB（12-15，验证 P1.5）
# gt = ground truth chunk ids，每个 query 1-2 条相关条目
# hit@k 按 "any of gt 出现在 top_k" 算

